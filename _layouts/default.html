<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  {% if page.description or site.description %}<meta name="description" content="{{ page.description | default: site.description }}">{% endif %}
  <link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/logo.png' | relative_url }}">
  <style>
    :root{ --ink:#1a2233; --muted:#5b6472; --line:#e6e8ee; --accent:#1c6fd0; --navy:#16266b; }
    *{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{margin:0;background:#fff;color:var(--ink);
      font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased}
    header.site{padding:26px 20px 6px;text-align:center}
    header.site img{width:100%;max-width:280px;height:auto}
    .wrap{max-width:720px;margin:0 auto;padding:8px 20px 56px}
    h1{font-size:1.85rem;line-height:1.2;color:var(--navy);margin:1.4rem 0 .6rem}
    h2{font-size:1.25rem;color:var(--navy);margin:2rem 0 .5rem}
    h3{font-size:1.05rem;margin:1.4rem 0 .4rem}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    hr{border:0;border-top:1px solid var(--line);margin:2rem 0}
    code{background:#f3f4f7;border-radius:4px;padding:.1em .35em;font-size:.9em}
    table{border-collapse:collapse;width:100%;margin:1rem 0;font-size:.95rem}
    th,td{border:1px solid var(--line);padding:.5rem .7rem;text-align:left;vertical-align:top}
    th{background:#f7f8fb}
    blockquote{margin:1rem 0;padding:.4rem 1rem;border-left:3px solid var(--accent);color:var(--muted)}
    em{color:var(--muted)}
    footer.site{margin-top:44px;padding-top:18px;border-top:1px solid var(--line);
      text-align:center;color:var(--muted);font-size:.85rem}
    footer.site a{color:var(--muted);margin:0 .45rem}
  </style>
</head>
<body>
  <header class="site">
    <a href="{{ '/' | relative_url }}"><img src="{{ '/assets/wordmark.png' | relative_url }}" alt="PM Cram"></a>
  </header>
  <div class="wrap">
    <main>{{ content }}</main>
    <footer class="site">
      <a href="{{ '/support/' | relative_url }}">Support</a>·
      <a href="{{ '/privacy/' | relative_url }}">Privacy</a>·
      <a href="{{ '/terms/' | relative_url }}">Terms</a>
      <div style="margin-top:8px">© PM Cram · Forge-Deck</div>
    </footer>
  </div>
</body>
</html>
